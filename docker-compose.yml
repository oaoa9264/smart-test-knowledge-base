version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: testkb-postgres
    environment:
      POSTGRES_DB: test_knowledge_base
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: testkb-backend
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/test_knowledge_base
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
    container_name: testkb-frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
